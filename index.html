<script>
/* ── Toggle corpo da legenda (desktop) ── */
function toggleLegendaCorpo() {
  var c = document.getElementById('legenda-corpo');
  var i = document.getElementById('icone-legenda');
  var aberta = !c.classList.contains('recolhida');
  if (aberta) {
    c.classList.add('recolhida');
    if (i) i.style.transform = 'rotate(180deg)';
  } else {
    c.classList.remove('recolhida');
    if (i) i.style.transform = 'rotate(0deg)';
  }
}

/* ── Toggle legenda inteira (botão flutuante mobile) ── */
function toggleLegendaGlobal() {
  var leg = document.getElementById('legenda-geo');
  var btn = document.getElementById('btn-toggle-legenda');
  var escondida = leg.classList.contains('escondida');
  if (escondida) {
    leg.classList.remove('escondida');
    if (btn) btn.classList.add('ativo');
  } else {
    leg.classList.add('escondida');
    if (btn) btn.classList.remove('ativo');
  }
}

/* ── Mobile: legenda começa escondida ── */
document.addEventListener('DOMContentLoaded', function() {
  if (window.innerWidth <= 600) {
    setTimeout(function() {
      var leg = document.getElementById('legenda-geo');
      if (leg) leg.classList.add('escondida');
    }, 200);
  }
});
</script>

var clearBtn = document.getElementById('busca-clear');

inputEl.addEventListener('input', function() {
  var q = this.value.trim().toUpperCase();
  clearBtn.style.display = q ? 'block' : 'none';
  if (!q) { sugesDiv.style.display='none'; return; }
  var matches = _nomes.filter(function(n) { return n.toUpperCase().includes(q); });
  if (!matches.length) { sugesDiv.style.display='none'; return; }
  sugesDiv.innerHTML = matches.slice(0,10).map(function(n) {
    return '<div onclick="irParaFuro(\''+n+'\')"+' +
           '" style="padding:8px 14px;cursor:pointer;font-size:13px;' +
           'color:#e6edf3;border-bottom:1px solid #21262d;' +
           'font-family:Source Sans 3,sans-serif;">' + n + '</div>';
  }).join('');
  sugesDiv.style.display = 'block';
});

inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    var q = this.value.trim().toUpperCase();
    var match = _nomes.find(function(n) { return n.toUpperCase() === q; });
    if (match) irParaFuro(match);
    sugesDiv.style.display = 'none';
  }
  if (e.key === 'Escape') {
    sugesDiv.style.display='none';
    inputEl.blur();
  }
});

  if (!e.target.closest('#busca-container') && !e.target.closest('#busca-sugestoes'))

});

function irParaFuro(nome) {

  var mapEl = document.querySelector('.folium-map') || document.querySelector('#map');
  // Acessar instância Leaflet
  var mapObj = null;
  for (var k in window) {

    }
  }
  if (mapObj) mapObj.setView(c, 17, {animate:true, duration:0.8});
  inputEl.value = nome;
  sugesDiv.style.display = 'none';
  clearBtn.style.display = 'block';
}

function limparBusca() {
  inputEl.value = '';
  sugesDiv.style.display = 'none';
  clearBtn.style.display = 'none';
}
