<script>
/* ── Toggle corpo da legenda (desktop) ── */
function toggleLegendaCorpo() {
  var c = document.getElementById('legenda-corpo');
  var i = document.getElementById('icone-legenda');
  var aberta = !c.classList.contains('recolhida');
  if (aberta) {
    c.classList.add('recolhida');
    if (i) i.style.transform = 'rotate(180deg)';
  } else {
    c.classList.remove('recolhida');
    if (i) i.style.transform = 'rotate(0deg)';
  }
}

/* ── Toggle legenda inteira (botão flutuante mobile) ── */
function toggleLegendaGlobal() {
  var leg = document.getElementById('legenda-geo');
  var btn = document.getElementById('btn-toggle-legenda');
  var escondida = leg.classList.contains('escondida');
  if (escondida) {
    leg.classList.remove('escondida');
    if (btn) btn.classList.add('ativo');
  } else {
    leg.classList.add('escondida');
    if (btn) btn.classList.remove('ativo');
  }
}

/* ── Mobile: legenda começa escondida ── */
document.addEventListener('DOMContentLoaded', function() {
  if (window.innerWidth <= 600) {
    setTimeout(function() {
      var leg = document.getElementById('legenda-geo');
      if (leg) leg.classList.add('escondida');
    }, 200);
  }
});
</script>

  clearBtn.style.display = 'block';
}
